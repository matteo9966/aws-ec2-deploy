name: Backend Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests and generate JSON report
        # run: |
        #   mkdir -p backend/test-results
        #   npm run test -w backend -- --reporter=json --outputFile=test-results/vitest-report.json
        run: npm run test:backend

      - name: Upload backend test JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-vitest-report
          path: backend/test-reports/test-output.json
          if-no-files-found: error
          retention-days: 1
